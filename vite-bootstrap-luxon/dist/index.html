<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vite Bootstrap Luxon</title>
  <script type="module" crossorigin src="./assets/index-XHdb99ZA.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-NyKXNYHJ.css">
</head>
<body>
  <main class="container py-5">
    <div class="row min-vh-100 align-items-start">
      <div class="col-2"></div>

      <div class="col-8">
        <button
          id="showTimeButton"
          type="button"
          class="btn btn-danger btn-lg w-100 py-5 fs-1"
        >
          Показать время
        </button>
      </div>

      <div class="col-2"></div>
    </div>
  </main>

  <div
    class="modal fade"
    id="timeModal"
    tabindex="-1"
    aria-labelledby="timeModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-3" id="timeModalLabel">
            Выполнила: Шулепова Виктория
          </h1>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Закрыть"
          ></button>
        </div>

        <div class="modal-body text-center">
          <p id="timeOutput" class="display-2 fw-bold my-4"></p>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary btn-lg"
            data-bs-dismiss="modal"
          >
            Закрыть
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
