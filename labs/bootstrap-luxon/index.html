<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Bootstrap demo</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light min-vh-100">
  <main class="container py-5">
    <div class="row min-vh-100 align-items-start">
      <div class="col-2"></div>

      <div class="col-8">
        <button
          id="showTimeButton"
          type="button"
          class="btn btn-danger btn-lg w-100 py-5 fs-1"
        >
          Показать время
        </button>
      </div>

      <div class="col-2"></div>
    </div>
  </main>

  <div
    class="modal fade"
    id="timeModal"
    tabindex="-1"
    aria-labelledby="timeModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-3" id="timeModalLabel">
            Выполнила: Шулепова Виктория
          </h1>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Закрыть"
          ></button>
        </div>

        <div class="modal-body text-center">
          <p id="timeOutput" class="display-2 fw-bold my-4"></p>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary btn-lg"
            data-bs-dismiss="modal"
          >
            Закрыть
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./dist/main.js"></script>
</body>
</html>
